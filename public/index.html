<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>銀行アプリ</title>
</head>
<body>

<h1>銀行アプリ</h1>

<!-- ログインボタン -->
<button onclick="showLogin()">ログイン</button>

<!-- 登録ボタン -->
<button onclick="showRegister()">ユーザー登録</button>

<!-- ログインフォーム -->
<div id="loginForm" style="display:none; margin-top:20px;">
  <h2>ログイン</h2>
  
  <input id="loginId" placeholder="ユーザーID"><br><br>
  <input id="loginPassword" placeholder="パスワード" type="password"><br><br>
  
  <button onclick="login()">ログイン</button>
</div>

<!-- 登録フォーム -->
<div id="registerForm" style="display:none; margin-top:20px;">
  <h2>ユーザー登録</h2>
  
  <input id="userId" placeholder="ユーザーID"><br><br>
  <input id="password" placeholder="パスワード"><br><br>
  
  <button onclick="createUser()">登録</button>
</div>

<!-- ログイン成功表示 -->
<div id="welcome" style="display:none;">
  <h2 id="welcomeText"></h2>
</div>

<!-- 送金機能 -->
<div id="transfer" style="display:none; margin-top:20px;">
  <h2>送金（管理者）</h2>
  
  <input id="toUser" placeholder="送金先ユーザーID"><br><br>
  <input id="amount" placeholder="金額" type="number"><br><br>
  
  <button onclick="sendMoney()">送金する</button>
</div>

<script>
  let currentUser = "";

  function showRegister() {
    document.getElementById("registerForm").style.display = "block";
    document.getElementById("loginForm").style.display = "none";
  }

  function showLogin() {
    document.getElementById("loginForm").style.display = "block";
    document.getElementById("registerForm").style.display = "none";
  }

  async function createUser() {
    const id = document.getElementById("userId").value;
    const password = document.getElementById("password").value;

    const res = await fetch("/create-user", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ id, password })
    });

    const text = await res.text();
    alert(text);
  }

  async function login() {
    const id = document.getElementById("loginId").value;
    const password = document.getElementById("loginPassword").value;

    const res = await fetch("/login", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ id, password })
    });

    if (res.ok) {
      const user = await res.json();

      currentUser = user.id;

      document.getElementById("welcome").style.display = "block";
      document.getElementById("welcomeText").innerText =
        user.id + " でログイン成功！";

      // 管理者だけ送金画面表示
      if (user.id === "admin") {
        document.getElementById("transfer").style.display = "block";
      }

    } else {
      alert("ログイン失敗");
    }
  }

  async function sendMoney() {
    const to = document.getElementById("toUser").value;
    const amount = Number(document.getElementById("amount").value);

    const res = await fetch("/send", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        from: currentUser,
        to: to,
        amount: amount
      })
    });

    const text = await res.text();
    alert(text);
  }
</script>

</body>
</html>
