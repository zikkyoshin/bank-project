<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>銀行アプリ</title>

<style>
body { text-align:center; font-family:sans-serif; }
.container { width:400px; margin:0 auto; }
input, button { margin:5px; }
.ban { color:red; }
</style>

</head>

<body>

<div class="container">

<h1>銀行アプリ</h1>

<button onclick="showLogin()">ログイン</button>
<button onclick="showRegister()">登録</button>

<div id="loginForm" style="display:none;">
<input id="loginId" placeholder="ID"><br>
<input id="loginPassword" placeholder="パス" type="password"><br>
<button onclick="login()">ログイン</button>
</div>

<div id="registerForm" style="display:none;">
<input id="userId" placeholder="ID"><br>
<input id="password" placeholder="パス"><br>
<button onclick="createUser()">登録</button>
</div>

<div id="welcome" style="display:none;"></div>

<div id="adminPanel" style="display:none;">
<h2>管理者</h2>

<h3>送金</h3>
<input id="toUser" placeholder="送信先">
<input id="amount" placeholder="金額" type="number">
<button onclick="send()">送金</button>

<h3>ユーザー一覧</h3>
<div id="users"></div>

<h3>履歴</h3>
<div id="history"></div>

</div>

</div>

<script>

let currentUser="";

// 表示切替
function showLogin(){
  loginForm.style.display="block";
  registerForm.style.display="none";
}

function showRegister(){
  registerForm.style.display="block";
  loginForm.style.display="none";
}

// 登録
async function createUser(){
  await fetch("/create-user",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      id:userId.value,
      password:password.value
    })
  });
  alert("作成完了");
}

// ログイン
async function login(){
  const res = await fetch("/login",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      id:loginId.value,
      password:loginPassword.value
    })
  });

  if(!res.ok){
    alert("ログイン失敗 or BAN中");
    return;
  }

  const user = await res.json();
  currentUser = user.id;

  welcome.style.display = "block";
  welcome.innerText = user.id + " 残高:" + user.points;

  // 管理者パネル
  if(user.id==="admin"){
    adminPanel.style.display="block";
    loadUsers();
    loadHistory();
  }
}

// 送金
async function send(){
  const text = await fetch("/send",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      from:currentUser,
      to:toUser.value,
      amount:Number(amount.value)
    })
  }).then(r=>r.text());

  alert(text);
  loadUsers();
}

// ✅ ユーザー一覧（BAN表示込み）
async function loadUsers(){
  const data = await fetch("/users").then(r=>r.json());

  users.innerHTML="";

  data.forEach(u=>{

    let banText = "";
    if(u.bannedUntil && new Date() < new Date(u.bannedUntil)){
      banText = "<span class='ban'>🚫BAN中</span>";
    }

    users.innerHTML += `
    <div>
      ${u.id} (${u.points}) ${banText}

      <button onclick="delUser('${u.id}')">削除</button>

      <input id="ban_${u.id}" placeholder="日数">
      <button onclick="banUser('${u.id}')">BAN</button>
    </div>
    `;
  });
}

// 削除
async function delUser(id){
  await fetch("/delete-user",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({id})
  });

  alert("削除完了");
  loadUsers();
}

// ✅ BAN（結果表示付き）
async function banUser(id){
  const days = document.getElementById("ban_"+id).value;

  const res = await fetch("/ban",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({id,days})
  });

  const text = await res.text();
  alert(text); // ←これで反応見える！

  loadUsers();
}

// 履歴表示
async function loadHistory(){
  const data = await fetch("/history").then(r=>r.json());

  history.innerHTML="";

  data.forEach(h=>{
    history.innerHTML += `
    <div>${h.from} → ${h.to} : ${h.amount}</div>
    `;
  });
}

</script>

</body>
</html>
``
