<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>銀行</title>

<style>
body{ text-align:center; font-family:sans-serif;}
.box{border:1px solid #aaa; padding:5px; margin:5px;}
.ban{color:red;}
</style>

</head>

<body>

<h1>銀行</h1>

<button onclick="showLogin()">ログイン</button>

<div id="loginForm" style="display:none;">
<input id="loginId">
<input id="loginPassword" type="password">
<button onclick="login()">ログイン</button>
</div>

<div id="welcome"></div>

<div id="admin" style="display:none;">

<h2>ユーザー</h2>
<div id="users"></div>

<h2>削除済み</h2>
<div id="deleted"></div>

<h2>履歴</h2>
<div id="history"></div>

</div>

<script>

let currentUser="";

function showLogin(){
 loginForm.style.display="block";
}

async function login(){
 const res=await fetch("/login",{
  method:"POST",
  headers:{'Content-Type':'application/json'},
  body:JSON.stringify({id:loginId.value,password:loginPassword.value})
 });

 if(!res.ok){alert("失敗");return;}

 const u=await res.json();
 currentUser=u.id;
 welcome.innerText=u.id+" 残高:"+u.points;

 if(u.id==="admin"){
  admin.style.display="block";
  loadUsers();
  loadDeleted();
  loadHistory();
 }
}

// ユーザー一覧
async function loadUsers(){
 const data=await fetch("/users").then(r=>r.json());
 users.innerHTML="";

 data.forEach(u=>{
  let ban="";
  if(u.bannedUntil){
   ban="<span class='ban'>🚫</span>";
  }

  users.innerHTML+=`
  <div class="box" onclick="selectUser('${u.id}')">
    ${u.id} (${u.points}) ${ban}
  </div>`;
 });
}

// 選択メニュー
function selectUser(id){
 if(!confirm(id+"操作する？")) return;

 const action=prompt("1送金 2BAN 3解除 4削除");

 if(action==="2"){
   if(confirm("BANする？")){
     const d=prompt("日数 or permanent");
     fetch("/ban",{method:"POST",headers:{'Content-Type':'application/json'},
     body:JSON.stringify({id,days:d})});
   }
 }

 if(action==="3"){
  fetch("/unban",{method:"POST",headers:{'Content-Type':'application/json'},
  body:JSON.stringify({id})});
 }

 if(action==="4"){
  if(confirm("本当に削除？")){
   fetch("/delete-user",{method:"POST",headers:{'Content-Type':'application/json'},
   body:JSON.stringify({id})});
  }
 }

 setTimeout(loadUsers,500);
}

// 削除済み
async function loadDeleted(){
 const data=await fetch("/deleted-users").then(r=>r.json());
 deleted.innerHTML="";

 data.forEach(u=>{
  deleted.innerHTML+=`
  <div class="box">
   ${u.id}
   <button onclick="restore('${u.id}')">復帰</button>
   <button onclick="hard('${u.id}')">完全削除</button>
  </div>`;
 });
}

function restore(id){
 fetch("/restore",{method:"POST",headers:{'Content-Type':'application/json'},
 body:JSON.stringify({id})});
 setTimeout(loadDeleted,500);
}

function hard(id){
 if(confirm("完全削除する？")){
   fetch("/hard-delete",{method:"POST",headers:{'Content-Type':'application/json'},
   body:JSON.stringify({id})});
 }
}

// 履歴
async function loadHistory(){
 const d=await fetch("/history").then(r=>r.json());
 history.innerHTML="";
 d.forEach(h=>{
  history.innerHTML+=`<div>${h.from}→${h.to}:${h.amount}</div>`;
 });
}

</script>

</body>
</html>
