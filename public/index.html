<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>銀行</title>

<style>
body{ text-align:center; font-family:sans-serif;}
.box{border:1px solid #aaa; padding:5px; margin:5px;}
</style>

</head>

<body>

<h1>銀行</h1>

<button onclick="showLogin()">ログイン</button>
<button onclick="showRegister()">登録</button>

<!-- ログイン -->
<div id="loginForm" style="display:none;">
<input id="loginId" placeholder="ID">
<input id="loginPassword" type="password" placeholder="パス">
<button onclick="login()">ログイン</button>
</div>

<!-- ✅ 追加：登録フォーム -->
<div id="registerForm" style="display:none;">
<input id="userId" placeholder="ID">
<input id="password" placeholder="パス">
<button onclick="createUser()">登録</button>
</div>

<div id="welcome"></div>

<div id="admin" style="display:none;">

<h2>ユーザー</h2>
<div id="users"></div>

<h2>削除済み</h2>
<div id="deleted"></div>

<h2>履歴</h2>
<div id="history"></div>

</div>

<script>

let currentUser="";

// 表示
function showLogin(){
 loginForm.style.display="block";
 registerForm.style.display="none";
}

function showRegister(){
 registerForm.style.display="block";
 loginForm.style.display="none";
}

// ✅ 登録
async function createUser(){
 const res = await fetch("/create-user",{
  method:"POST",
  headers:{'Content-Type':'application/json'},
  body:JSON.stringify({
    id:userId.value,
    password:password.value
  })
 });

 alert(await res.text());
}

// ログイン
async function login(){
 const res=await fetch("/login",{
  method:"POST",
  headers:{'Content-Type':'application/json'},
  body:JSON.stringify({
    id:loginId.value,
    password:loginPassword.value
  })
 });

 if(!res.ok){
  alert("失敗 or BAN中");
  return;
 }

 const u=await res.json();
 currentUser=u.id;

 welcome.innerText=u.id+" 残高:"+u.points;

 // BAN残り表示
 if(u.bannedUntil && u.bannedUntil !== "permanent"){
   const diff = Math.ceil((new Date(u.bannedUntil) - new Date())/86400000);
   welcome.innerText += "（BAN残り:"+diff+"日）";
 }

 if(u.id==="admin"){
  admin.style.display="block";
  loadUsers();
  loadDeleted();
  loadHistory();
 }
}

// --- 以下そのまま（前と同じ） ---

async function loadUsers(){
 const data=await fetch("/users").then(r=>r.json());
 users.innerHTML="";
 data.forEach(u=>{
  users.innerHTML+=`
  <div class="box" onclick="selectUser('${u.id}')">
    ${u.id} (${u.points})
  </div>`;
 });
}

function selectUser(id){
 if(!confirm(id+"操作する？")) return;

 const action=prompt("1送金 2BAN 3解除 4削除");

 if(action==="2"){
   if(confirm("BANする？")){
     const d=prompt("日数 or permanent");
     fetch("/ban",{method:"POST",headers:{'Content-Type':'application/json'},
     body:JSON.stringify({id,days:d})});
   }
 }

 if(action==="3"){
  fetch("/unban",{method:"POST",headers:{'Content-Type':'application/json'},
  body:JSON.stringify({id})});
 }

 if(action==="4"){
  if(confirm("削除する？")){
   fetch("/delete-user",{method:"POST",headers:{'Content-Type':'application/json'},
   body:JSON.stringify({id})});
  }
 }

 setTimeout(loadUsers,500);
}

async function loadDeleted(){
 const data=await fetch("/deleted-users").then(r=>r.json());
 deleted.innerHTML="";
 data.forEach(u=>{
  deleted.innerHTML+=`
  <div class="box">
   ${u.id}
   <button onclick="restore('${u.id}')">復帰</button>
   <button onclick="hard('${u.id}')">完全削除</button>
  </div>`;
 });
}

function restore(id){
 fetch("/restore",{method:"POST",headers:{'Content-Type':'application/json'},
 body:JSON.stringify({id})});
 setTimeout(loadDeleted,500);
}

function hard(id){
 if(confirm("完全削除する？")){
   fetch("/hard-delete",{method:"POST",headers:{'Content-Type':'application/json'},
   body:JSON.stringify({id})});
 }
}

async function loadHistory(){
 const d=await fetch("/history").then(r=>r.json());
 history.innerHTML="";
 d.forEach(h=>{
  history.innerHTML+=`<div>${h.from}→${h.to}:${h.amount}</div>`;
 });
}

</script>

</body>
</html>
