<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>銀行アプリ</title>
</head>
<body>

<h1>銀行アプリ</h1>

<button onclick="showRegister()">ユーザー登録</button>

<div id="registerForm" style="display:none; margin-top:20px;">
  <h2>ユーザー登録</h2>
  
  <input id="userId" placeholder="ユーザーID"><br><br>
  <input id="password" placeholder="パスワード"><br><br>
  
  <button onclick="createUser()">登録</button>
</div>

<script>
  function showRegister() {
    document.getElementById("registerForm").style.display = "block";
  }

  async function createUser() {
    const id = document.getElementById("userId").value;
    const password = document.getElementById("password").value;

    const res = await fetch("/create-user", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ id, password })
    });

    const text = await res.text();
    alert(text);
  }
</script>

</body>
</html>
